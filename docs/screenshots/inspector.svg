<svg xmlns="http://www.w3.org/2000/svg" width="860" height="580" viewBox="0 0 860 580" font-family="-apple-system, Segoe UI, Roboto, sans-serif">
  <rect width="860" height="580" fill="#0b0e14"/>
  <!-- dimmed app behind -->
  <rect x="0" y="0" width="860" height="580" fill="#0b0e14"/>
  <rect x="0" y="0" width="380" height="580" fill="#0e1119" opacity="0.6"/>
  <!-- drawer -->
  <rect x="380" y="0" width="480" height="580" fill="#12161f"/>
  <line x1="380" y1="0" x2="380" y2="580" stroke="#232a38"/>
  <!-- drawer head -->
  <text x="404" y="38" font-size="15" font-weight="650" fill="#e6e9ef">Retrieval inspector</text>
  <text x="828" y="40" font-size="20" fill="#8a93a6" text-anchor="middle">×</text>
  <line x1="380" y1="58" x2="860" y2="58" stroke="#232a38"/>
  <!-- search -->
  <rect x="404" y="76" width="330" height="38" rx="10" fill="#171c27" stroke="#232a38"/>
  <text x="420" y="100" font-size="13" fill="#e6e9ef">chain of custody</text>
  <rect x="742" y="76" width="94" height="38" rx="10" fill="#6ea8fe"/>
  <text x="789" y="100" font-size="13" font-weight="650" fill="#0b0e14" text-anchor="middle">Retrieve</text>
  <text x="404" y="140" font-size="11.5" fill="#8a93a6">3 chunk(s) • 214 ms • hybrid + rerank</text>

  <!-- chunk 1 -->
  <rect x="404" y="156" width="432" height="112" rx="10" fill="#171c27" stroke="#232a38"/>
  <circle cx="424" cy="180" r="10" fill="#6ea8fe"/><text x="424" y="184" font-size="11" font-weight="700" fill="#0b0e14" text-anchor="middle">1</text>
  <text x="444" y="184" font-size="12" fill="#e6e9ef" font-weight="600">sample_evidence_policy.md <tspan fill="#8a93a6" font-weight="400">· chunk 0</tspan></text>
  <text x="812" y="184" font-size="12" fill="#6ea8fe" font-weight="650" text-anchor="end">7.421</text>
  <rect x="424" y="196" width="392" height="6" rx="3" fill="#232a38"/><rect x="424" y="196" width="392" height="6" rx="3" fill="#6ea8fe"/>
  <text x="424" y="224" font-size="11.5" fill="#8a93a6">Every item of evidence must be logged with a unique identifier at</text>
  <text x="424" y="242" font-size="11.5" fill="#8a93a6">the moment of collection. Any transfer of custody must be signed…</text>

  <!-- chunk 2 -->
  <rect x="404" y="280" width="432" height="112" rx="10" fill="#171c27" stroke="#232a38"/>
  <circle cx="424" cy="304" r="10" fill="#6ea8fe"/><text x="424" y="308" font-size="11" font-weight="700" fill="#0b0e14" text-anchor="middle">2</text>
  <text x="444" y="308" font-size="12" fill="#e6e9ef" font-weight="600">sample_evidence_policy.md <tspan fill="#8a93a6" font-weight="400">· chunk 0</tspan></text>
  <text x="812" y="308" font-size="12" fill="#6ea8fe" font-weight="650" text-anchor="end">3.108</text>
  <rect x="424" y="320" width="392" height="6" rx="3" fill="#232a38"/><rect x="424" y="320" width="214" height="6" rx="3" fill="#6ea8fe"/>
  <text x="424" y="348" font-size="11.5" fill="#8a93a6">Each access event is recorded in the custody log, including the</text>
  <text x="424" y="366" font-size="11.5" fill="#8a93a6">reason for access. Remote access to digital evidence is prohibited.</text>

  <!-- chunk 3 -->
  <rect x="404" y="404" width="432" height="112" rx="10" fill="#171c27" stroke="#232a38"/>
  <circle cx="424" cy="428" r="10" fill="#6ea8fe"/><text x="424" y="432" font-size="11" font-weight="700" fill="#0b0e14" text-anchor="middle">3</text>
  <text x="444" y="432" font-size="12" fill="#e6e9ef" font-weight="600">sample_evidence_policy.md <tspan fill="#8a93a6" font-weight="400">· chunk 0</tspan></text>
  <text x="812" y="432" font-size="12" fill="#6ea8fe" font-weight="650" text-anchor="end">-1.244</text>
  <rect x="424" y="444" width="392" height="6" rx="3" fill="#232a38"/><rect x="424" y="444" width="70" height="6" rx="3" fill="#6ea8fe"/>
  <text x="424" y="472" font-size="11.5" fill="#8a93a6">After the retention period, evidence is disposed of by a two-person</text>
  <text x="424" y="490" font-size="11.5" fill="#8a93a6">team. The disposal is witnessed, documented, and the log is closed.</text>

  <!-- note on left -->
  <text x="40" y="300" font-size="13" fill="#8a93a6" font-weight="600">No LLM call —</text>
  <text x="40" y="322" font-size="13" fill="#8a93a6" font-weight="600">pure retrieval + rerank</text>

  <!-- mockup badge -->
  <rect x="720" y="66" width="140" height="20" fill="#9d7bff"/>
  <text x="790" y="80" font-size="11" font-weight="700" fill="#0b0e14" text-anchor="middle">MOCKUP — not a real screenshot</text>
</svg>
