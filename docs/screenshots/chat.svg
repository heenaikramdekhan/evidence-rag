  <text x="112" y="330" font-size="11.5" fill="#8a93a6">…default retention period after closure is seven years, unless a court…</text>
  <rect x="70" y="354" width="620" height="52" rx="10" fill="#12161f" stroke="#232a38"/>
  <circle cx="92" cy="374" r="9" fill="#6ea8fe"/><text x="92" y="378" font-size="11" font-weight="700" fill="#0b0e14" text-anchor="middle">2</text>
  <text x="112" y="372" font-size="12.5" fill="#e6e9ef" font-weight="600">sample_evidence_policy.md · chunk 0</text>
  <text x="112" y="392" font-size="11.5" fill="#8a93a6">…evidence is disposed of by a two-person team. The disposal is witnessed…</text>
