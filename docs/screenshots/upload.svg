<svg xmlns="http://www.w3.org/2000/svg" width="860" height="580" viewBox="0 0 860 580" font-family="-apple-system, Segoe UI, Roboto, sans-serif">
  <rect width="860" height="580" fill="#0b0e14"/>
  <!-- scrim -->
  <rect x="0" y="0" width="860" height="580" fill="#05070b" opacity="0.55"/>
  <!-- dialog -->
  <rect x="230" y="130" width="400" height="320" rx="16" fill="#12161f" stroke="#232a38"/>
  <text x="254" y="172" font-size="16" font-weight="650" fill="#e6e9ef">Upload documents</text>
  <text x="606" y="174" font-size="20" fill="#8a93a6" text-anchor="middle">×</text>
  <text x="254" y="198" font-size="12.5" fill="#8a93a6">PDF, Markdown, HTML or TXT — then re-indexed.</text>
  <!-- dropzone -->
  <rect x="254" y="216" width="352" height="132" rx="12" fill="#171c27" stroke="#6ea8fe" stroke-dasharray="6 5"/>
  <text x="430" y="272" font-size="26" fill="#6ea8fe" text-anchor="middle">⬆</text>
  <text x="430" y="300" font-size="13.5" fill="#e6e9ef" text-anchor="middle" font-weight="600">Drop files here or click to browse</text>
  <text x="430" y="322" font-size="11.5" fill="#8a93a6" text-anchor="middle">2 files selected · evidence_log.pdf, custody.md</text>
  <!-- actions -->
  <rect x="254" y="370" width="352" height="26" rx="8" fill="#0b0e14" stroke="#232a38"/>
  <text x="266" y="387" font-size="11.5" fill="#8a93a6">Indexed 2 document(s) → 14 chunk(s) into “evidence”.</text>
  <rect x="470" y="408" width="136" height="34" rx="10" fill="#6ea8fe"/>
  <text x="538" y="430" font-size="13" font-weight="650" fill="#0b0e14" text-anchor="middle">Upload &amp; index</text>
  <rect x="254" y="408" width="94" height="34" rx="10" fill="#171c27" stroke="#232a38"/>
  <text x="301" y="430" font-size="13" fill="#e6e9ef" text-anchor="middle">Cancel</text>
  <!-- mockup badge -->
  <rect x="720" y="66" width="140" height="20" fill="#9d7bff"/>
  <text x="790" y="80" font-size="11" font-weight="700" fill="#0b0e14" text-anchor="middle">MOCKUP — not a real screenshot</text>
</svg>
