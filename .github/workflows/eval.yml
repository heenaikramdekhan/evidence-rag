name: RAG Eval

# Gates every PR: if faithfulness/accuracy on the golden set drops below the
# threshold, the build fails. Runs on the free GitHub Actions tier.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Unit tests
        run: pytest

  eval:
    runs-on: ubuntu-latest
    needs: tests
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Ingest corpus
        run: python -m scripts.ingest_docs
      - name: Run golden-set eval
        env:
          LLM_PROVIDER: groq
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python -m eval.evaluate --threshold 0.9
